<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AI Healthcare Disease Prediction</title>
<style>
  :root {
    --bg-1: #061327;
    --bg-2: #071f3f;
    --bg-3: #0a2b57;
    --panel: rgba(10, 23, 47, 0.65);
    --panel-border: rgba(141, 199, 255, 0.28);
    --text: #e7f3ff;
    --muted: #9dc1e7;
    --accent: #24d7ff;
    --accent-2: #4f7bff;
    --input-bg: rgba(4, 13, 30, 0.72);
  }

  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    min-height: 100vh;
    display: grid;
    place-items: center;
    padding: 24px;
    font-family: "Segoe UI", "Tahoma", sans-serif;
    color: var(--text);
    background:
      radial-gradient(circle at 15% 20%, #1c6dff33 0 220px, transparent 220px),
      radial-gradient(circle at 82% 75%, #00ddff2b 0 260px, transparent 260px),
      linear-gradient(140deg, var(--bg-1), var(--bg-2), var(--bg-3));
    overflow: hidden;
  }

  body::before {
    content: "";
    position: fixed;
    inset: -20%;
    background: conic-gradient(from 90deg, #2ea8ff00, #2ea8ff1e, #2ea8ff00 40%);
    animation: rotateGlow 14s linear infinite;
    pointer-events: none;
  }

  @keyframes rotateGlow {
    to {
      transform: rotate(360deg);
    }
  }

  .container {
    width: min(430px, 100%);
    padding: 30px 26px 22px;
    border: 1px solid var(--panel-border);
    border-radius: 22px;
    background: var(--panel);
    backdrop-filter: blur(16px);
    box-shadow:
      0 20px 60px rgba(0, 0, 0, 0.45),
      inset 0 0 0 1px rgba(255, 255, 255, 0.04);
    position: relative;
    z-index: 1;
  }

  .badge {
    display: inline-block;
    padding: 6px 12px;
    border-radius: 999px;
    border: 1px solid #6acfff59;
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #bde8ff;
    background: #0d2c52a8;
    margin-bottom: 14px;
  }

  h2 {
    margin: 0 0 6px;
    font-size: clamp(1.5rem, 3.4vw, 1.9rem);
    line-height: 1.15;
    color: #f2f9ff;
  }

  .subtitle {
    margin: 0 0 20px;
    color: var(--muted);
    font-size: 0.93rem;
  }

  .field {
    margin: 0 0 12px;
  }

  .field label {
    display: block;
    margin-bottom: 6px;
    font-size: 0.8rem;
    letter-spacing: 0.04em;
    color: #bcd9f7;
    text-transform: uppercase;
  }

  input {
    width: 100%;
    padding: 11px 12px;
    border: 1px solid #8fcbff4a;
    border-radius: 10px;
    background: var(--input-bg);
    color: #eaf5ff;
    font-size: 0.95rem;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s, transform 0.2s;
  }

  input::placeholder {
    color: #8fb0d5;
  }

  input:focus {
    border-color: #77e4ff;
    box-shadow: 0 0 0 3px rgba(50, 197, 255, 0.22);
    transform: translateY(-1px);
  }

  button {
    width: 100%;
    margin-top: 8px;
    padding: 12px;
    border: 0;
    border-radius: 12px;
    font-size: 0.98rem;
    font-weight: 600;
    letter-spacing: 0.03em;
    color: #011327;
    background: linear-gradient(90deg, var(--accent), var(--accent-2));
    cursor: pointer;
    transition: transform 0.2s ease, box-shadow 0.2s ease, filter 0.2s ease;
    box-shadow: 0 10px 22px rgba(36, 173, 255, 0.35);
  }

  button:hover {
    transform: translateY(-1px);
    box-shadow: 0 14px 28px rgba(36, 173, 255, 0.42);
    filter: brightness(1.05);
  }

  button:active {
    transform: translateY(0);
  }

  .result {
    margin-top: 16px;
    min-height: 24px;
    padding: 10px 12px;
    border-radius: 10px;
    text-align: center;
    font-size: 0.95rem;
    color: #c9f0ff;
    border: 1px solid #75cfff42;
    background: #0c2b4e6b;
  }

  .footer {
    margin-top: 12px;
    text-align: center;
    font-size: 0.76rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #8eb2da;
  }
</style>
</head>
<body>
  <div class="container">
    <span class="badge">AI Diagnostic Engine</span>
    <h2>Healthcare Prediction</h2>
    <p class="subtitle">Real-time disease risk screening from core clinical indicators.</p>

    <form action="/predict" method="post">
      <div class="field">
        <label for="age">Age</label>
        <input id="age" type="number" name="age" placeholder="Enter age" required />
      </div>

      <div class="field">
        <label for="glucose">Glucose Level</label>
        <input id="glucose" type="number" name="glucose" placeholder="e.g. 120" required />
      </div>

      <div class="field">
        <label for="bp">Blood Pressure</label>
        <input id="bp" type="number" name="bp" placeholder="e.g. 80" required />
      </div>

      <div class="field">
        <label for="bmi">BMI</label>
        <input id="bmi" type="number" step="0.1" name="bmi" placeholder="e.g. 24.6" required />
      </div>

      <div class="field">
        <label for="insulin">Insulin Level</label>
        <input id="insulin" type="number" name="insulin" placeholder="e.g. 95" required />
      </div>

      <button type="submit">Predict Disease</button>
    </form>

    <div class="result">{{ prediction_text }}</div>
    <div class="footer">AI Healthcare System</div>
  </div>
</body>
</html>
